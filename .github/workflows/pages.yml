name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main]
  # Build Latent Space merges its own commit using GITHUB_TOKEN, and GitHub
  # never fires `push` for those. Without this trigger the automated
  # latentspace.json update would sit on main and never publish.
  workflow_run:
    workflows: ["Build Latent Space"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # `completed` fires on failure too; only publish a successful upstream run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GitHub Pages cannot serve Git LFS files, so the legacy branch build
          # published 132-byte pointer files instead of the images. Resolving
          # them here is the whole reason this workflow exists.
          lfs: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.11'
          bundler-cache: true

      - uses: actions/configure-pages@v5

      - run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
