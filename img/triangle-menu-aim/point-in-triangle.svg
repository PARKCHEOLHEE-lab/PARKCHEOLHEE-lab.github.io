<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="monospace" font-size="11">
  <defs>
    <marker id="arr-edge" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-d1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e06040"/>
    </marker>
    <marker id="arr-d2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4090e0"/>
    </marker>
    <marker id="arr-d3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#40a060"/>
    </marker>
  </defs>

  <!-- ====== LEFT: Point INSIDE ====== -->

  <!-- Triangle fill -->
  <polygon points="80,280 200,40 340,260" fill="#e8f4e8" fill-opacity="0.5" stroke="#666" stroke-width="1.2"/>

  <!-- Edge vectors: A→B, B→C, C→A -->
  <line x1="80" y1="280" x2="200" y2="40" stroke="#555" stroke-width="1.2" marker-end="url(#arr-edge)"/>
  <line x1="200" y1="40" x2="340" y2="260" stroke="#555" stroke-width="1.2" marker-end="url(#arr-edge)"/>
  <line x1="340" y1="260" x2="80" y2="280" stroke="#555" stroke-width="1.2" marker-end="url(#arr-edge)"/>

  <!-- Vertex labels -->
  <text x="60" y="298" fill="#333" font-weight="bold">A</text>
  <text x="193" y="30" fill="#333" font-weight="bold">B</text>
  <text x="345" y="275" fill="#333" font-weight="bold">C</text>

  <!-- Point P (inside) -->
  <circle cx="195" cy="190" r="5" fill="#2d8a4e" stroke="#1a5c30" stroke-width="1.5"/>
  <text x="205" y="188" fill="#1a5c30" font-weight="bold">P</text>

  <!-- Cross product vectors from P -->
  <!-- d1: (P-A) × (B-A) — vectors from A -->
  <line x1="80" y1="280" x2="195" y2="190" stroke="#e06040" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-d1)"/>
  <line x1="80" y1="280" x2="200" y2="40" stroke="#e06040" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="95" y="225" fill="#e06040" font-size="10">P-A</text>

  <!-- d2: (P-B) × (C-B) — vectors from B -->
  <line x1="200" y1="40" x2="195" y2="190" stroke="#4090e0" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-d2)"/>
  <line x1="200" y1="40" x2="340" y2="260" stroke="#4090e0" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="175" y="115" fill="#4090e0" font-size="10">P-B</text>

  <!-- d3: (P-C) × (A-C) — vectors from C -->
  <line x1="340" y1="260" x2="195" y2="190" stroke="#40a060" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-d3)"/>
  <line x1="340" y1="260" x2="80" y2="280" stroke="#40a060" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="280" y="215" fill="#40a060" font-size="10">P-C</text>

  <!-- Sign indicators -->
  <text x="110" y="250" fill="#e06040" font-size="10">d₁ &gt; 0</text>
  <text x="230" y="100" fill="#4090e0" font-size="10">d₂ &gt; 0</text>
  <text x="290" y="285" fill="#40a060" font-size="10">d₃ &gt; 0</text>

  <!-- Result label -->
  <text x="130" y="330" fill="#1a5c30" font-size="12" font-weight="bold">all same sign → inside ✓</text>

  <!-- ====== RIGHT: Point OUTSIDE ====== -->

  <!-- Triangle fill -->
  <polygon points="490,280 610,40 750,260" fill="#fbe8e8" fill-opacity="0.5" stroke="#666" stroke-width="1.2"/>

  <!-- Edge vectors: A→B, B→C, C→A -->
  <line x1="490" y1="280" x2="610" y2="40" stroke="#555" stroke-width="1.2" marker-end="url(#arr-edge)"/>
  <line x1="610" y1="40" x2="750" y2="260" stroke="#555" stroke-width="1.2" marker-end="url(#arr-edge)"/>
  <line x1="750" y1="260" x2="490" y2="280" stroke="#555" stroke-width="1.2" marker-end="url(#arr-edge)"/>

  <!-- Vertex labels -->
  <text x="470" y="298" fill="#333" font-weight="bold">A</text>
  <text x="603" y="30" fill="#333" font-weight="bold">B</text>
  <text x="755" y="275" fill="#333" font-weight="bold">C</text>

  <!-- Point P (outside — to the left of edge A→B) -->
  <circle cx="480" cy="140" r="5" fill="#c0392b" stroke="#8e2a1e" stroke-width="1.5"/>
  <text x="458" y="137" fill="#8e2a1e" font-weight="bold">P</text>

  <!-- Cross product vectors from P -->
  <!-- d1: (P-A) × (B-A) — vectors from A -->
  <line x1="490" y1="280" x2="480" y2="140" stroke="#e06040" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-d1)"/>
  <line x1="490" y1="280" x2="610" y2="40" stroke="#e06040" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="458" y="215" fill="#e06040" font-size="10">P-A</text>

  <!-- d2: (P-B) × (C-B) — vectors from B -->
  <line x1="610" y1="40" x2="480" y2="140" stroke="#4090e0" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-d2)"/>
  <line x1="610" y1="40" x2="750" y2="260" stroke="#4090e0" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="535" y="80" fill="#4090e0" font-size="10">P-B</text>

  <!-- d3: (P-C) × (A-C) — vectors from C -->
  <line x1="750" y1="260" x2="480" y2="140" stroke="#40a060" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-d3)"/>
  <line x1="750" y1="260" x2="490" y2="280" stroke="#40a060" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="630" y="210" fill="#40a060" font-size="10">P-C</text>

  <!-- Sign indicators -->
  <text x="500" y="250" fill="#e06040" font-size="10">d₁ &lt; 0</text>
  <text x="640" y="100" fill="#4090e0" font-size="10">d₂ &gt; 0</text>
  <text x="700" y="285" fill="#40a060" font-size="10">d₃ &gt; 0</text>

  <!-- Result label -->
  <text x="530" y="330" fill="#8e2a1e" font-size="12" font-weight="bold">mixed signs → outside ✗</text>
</svg>
