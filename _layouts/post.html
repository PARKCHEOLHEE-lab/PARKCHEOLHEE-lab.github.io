---
layout: default
---

<link rel="stylesheet" href="{{ site.highlightjs.css }}">
<script src="{{ site.highlightjs.js }}"></script>
<script>
  hljs.highlightAll();
</script>

{% unless page.mathjax %}
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {inlineMath: [['$','$'], ['\\(','\\)']]},
    TeX: {
      extensions: ["cancel.js"]
    }
  });
</script>
<script type="text/javascript" async
  src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
</script>
{% endunless %}

{% if page.mermaid %}
<style>
  pre.mermaid { background: transparent; padding: 0; border-radius: 0; text-align: center; }
  pre.mermaid svg { max-width: 100%; height: auto; }
  pre.mermaid.narrow svg { max-width: 560px !important; }
  pre.mermaid.compact svg { max-width: 380px !important; }
</style>
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  mermaid.initialize({ startOnLoad: true, theme: "neutral", securityLevel: "strict" });
</script>
{% endif %}

<article>

  {% include meta.html post=page %}

  {{ content }}

  {% if page.comment != false and page.content != empty %}
    <div class="col-lg-8 col-md-10 mx-auto">
      <hr />

      <script src="https://utteranc.es/client.js"
        repo="{{ site.utterances.repo }}"
        issue-term="url"
        label="comment"
        theme="github-light"
        crossorigin="anonymous"
        async>
      </script>
    </div><br><br>
  {% endif %}

</article>
